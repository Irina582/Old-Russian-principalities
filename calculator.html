<!DOCTYPE html>
<html>

<head>
  <title>Калькулятор</title>
  <link rel="stylesheet" href="calculator.css">
  <script type="text/javascript" src="calculator.js"></script> 
</head>

<body>
  <div class="main-principalities"> <!-- div - это базовый html-контейнер, который может содержать в себе другие html-элементы. -->
    
    <!-- блок с экраном калькулятора, где будет выводиться результат вычислений. -->
    <div id="result-principalities" class="result-principalities">
      0
    </div>

    <!-- блок с кнопками калькулятора. -->
    <div>
      <!--горизонтальный ряд из четырех кнопок-->
      <div>  
        <button id="btn_op_clear-principalities" class="my-btn-principalities secondary-principalities">C</button>    <!-- про тэг кнопки: https://www.w3schools.com/tags/tag_button.asp -->
        <button id="btn_op_sign-principalities" class="my-btn-principalities secondary-principalities">+/-</button>
        <button id="btn_op_percent-principalities" class="my-btn-principalities secondary-principalities">%</button>
        <button id="btn_op_div-principalities" class="my-btn-principalities primary-principalities">/</button>
        <button id="btn_op_backspace-principalities" class="my-btn-principalities back-principalities">backspace</button>
        <button id="btn_op_theme-principalities" class="my-btn-principalities back-principalities">theme</button>
      </div>

      <div>
        <button id="btn_digit_7-principalities" class="my-btn-principalities">7</button>
        <button id="btn_digit_8-principalities" class="my-btn-principalities">8</button>
        <button id="btn_digit_9-principalities" class="my-btn-principalities">9</button>
        <button id="btn_op_mult-principalities" class="my-btn-principalities primary-principalities">x</button>
        <button id="btn_op_color-principalities" class="my-btn-principalities back-principalities">color</button>
        <button id="btn_op_rescolor-principalities" class="my-btn-principalities back-principalities">res_col</button>
      </div>

      <div>
        <button id="btn_digit_4-principalities" class="my-btn-principalities">4</button>
        <button id="btn_digit_5-principalities" class="my-btn-principalities">5</button>
        <button id="btn_digit_6-principalities" class="my-btn-principalities">6</button>
        <button id="btn_op_minus-principalities" class="my-btn-principalities primary-principalities">-</button>
        <button id="btn_op_sqrt-principalities" class="my-btn-principalities secondary-principalities">√</button>
        <button id="btn_op_square-principalities" class="my-btn-principalities secondary-principalities">x²</button>
        <a href="https://github.com/Irina582"><button class="my-btn-principalities back-principalities">Github</button></a>
      </div>

      <div>
        <button id="btn_digit_1-principalities" class="my-btn-principalities">1</button>
        <button id="btn_digit_2-principalities" class="my-btn-principalities">2</button>
        <button id="btn_digit_3-principalities" class="my-btn-principalities">3</button>
        <button id="btn_op_plus-principalities" class="my-btn-principalities primary-principalities">+</button>
        <button id="btn_op_factorial-principalities" class="my-btn-principalities secondary-principalities">x!</button>
        <button id="btn_op_modul-principalities" class="my-btn-principalities secondary-principalities">|x|</button>
        <button id="btn_date_convert-principalities" class="my-btn-principalities back-principalities">->yulian</button>
      </div>

      <div>
        <button id="btn_digit_0-principalities" class="my-btn-principalities">0</button>
        <button id="btn_digit_000-principalities" class="my-btn-principalities">000</button>
        <button id="btn_digit_dot-principalities" class="my-btn-principalities">.</button>
        <button id="btn_op_equal-principalities" class="my-btn-principalities primary-principalities execute-principalities">=</button>
      </div>
    </div>
  </div>
</body>
</html>
